# This is a Databricks asset bundle definition for test_databricks.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databricks_lakeflow
  uuid: 08bcd056-70c2-4040-b19a-e2c353156989

python:
  venv_path: .venv
  # Functions called to load resources defined in Python. See resources/__init__.py
  resources:
    - 'resources:load_resources'

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-242761d2-d8ef.cloud.databricks.com
    variables:
      catalog: workspace
      schema: lakeflow_db_dev
  prod:
    mode: production
    workspace:
      host: https://dbc-242761d2-d8ef.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/eric.martinez@live.cl to make sure we only have a single copy.
      root_path: /Workspace/Users/eric.martinez@live.cl/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: lakeflow_db_prod
    permissions:
      - user_name: eric.martinez@live.cl
        level: CAN_MANAGE

resources:
  jobs:
    emol_job:
      tasks:
        - task_key: extract_links
          libraries:
            - pypi:
                package: scrapling==0.4
